<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tempo — find your beat</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    html, body { margin: 0; padding: 0; background: #1a1815; height: 100%; }
    * { box-sizing: border-box; }
    #root { height: 100%; }
    button { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @keyframes tempo-toast-in {
      0% { transform: translateX(-50%) translateY(-12px); opacity: 0; }
      100% { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="profile.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const { IOSDevice } = window;
    const { useEffect, useState } = React;

    const DEVICE_W = 402, DEVICE_H = 874;
    function Root() {
      const [box, setBox] = useState({ scale: 1, bare: false, w: DEVICE_W, h: DEVICE_H });
      useEffect(() => {
        const fit = () => {
          const vw = window.innerWidth, vh = window.innerHeight;
          // Phone / narrow viewport → fill the screen edge-to-edge, no bezel.
          if (vw <= 600) {
            setBox({ scale: 1, bare: true, w: vw, h: vh });
            return;
          }
          // Desktop → framed device, scaled to fit with breathing room.
          const s = Math.min(1, (vh - 24) / DEVICE_H, (vw - 24) / DEVICE_W);
          setBox({ scale: s, bare: false, w: DEVICE_W, h: DEVICE_H });
        };
        fit();
        window.addEventListener("resize", fit);
        return () => window.removeEventListener("resize", fit);
      }, []);
      return (
        <div style={{
          width: "100%", height: "100vh",
          background: box.bare ? "#f5f1ea"
            : "radial-gradient(circle at 30% 0%, #2a2522 0%, #16140f 70%)",
          display: "grid", placeItems: "center",
          overflow: "hidden",
        }}>
          <div style={{
            width: box.w * box.scale,
            height: box.h * box.scale,
            position: "relative",
          }}>
            <div style={{
              position: "absolute", top: 0, left: 0,
              width: box.w, height: box.h,
              transform: `scale(${box.scale})`,
              transformOrigin: "top left",
              willChange: "transform",
            }}>
              <IOSDevice width={box.w} height={box.h} bare={box.bare}>
                <App />
              </IOSDevice>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
